<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>의리T의 실시간(RTDB) 도덕 토론방</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 25px; line-height: 1.6; background-color: #f2f5f8; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #2C3E50; text-align: center; margin-bottom: 5px; }
        .sub-title { text-align: center; color: #7F8C8D; margin-bottom: 20px; font-size: 14px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #34495E; }
        input, select, textarea { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #BDC3C7; border-radius: 6px; font-size: 15px; }
        textarea { height: 180px; resize: none; background-color: #f9f9f9; color: #2C3E50; font-weight: 500; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; border-radius: 6px; border: none; transition: 0.2s; }
        
        #startBtn { background-color: #E74C3C; color: white; }
        #startBtn:hover { background-color: #C0392B; }
        #stopBtn { background-color: #7F8C8D; color: white; }
        #stopBtn:hover { background-color: #6C7A89; }
        #submitBtn { width: 100%; background-color: #2ECC71; color: white; margin-top: 25px; font-size: 16px; }
        #submitBtn:hover { background-color: #27AE60; }
        
        button:disabled { background-color: #BDC3C7 !important; color: #7F8C8D !important; cursor: not-allowed; }
        #status { font-weight: bold; text-align: center; margin-top: 20px; color: #34495E; padding: 10px; background: #EAEDED; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎤 실시간 도덕 토론방 (RTDB 버전)</h1>
    <div class="sub-title">Realtime Database를 사용하여 100% 무료로 안전하게 전송합니다.</div>
    <hr>
    
    <label>👥 참여 학생 이름</label>
    <input type="text" id="studentNames" placeholder="예: 김철수, 이영희, 박민수">
    
    <label>🏫 모둠 선택</label>
    <select id="teamSelect">
        <option value="1모둠">1모둠</option>
        <option value="2모둠">2모둠</option>
        <option value="3모둠">3모둠</option>
        <option value="4모둠">4모둠</option>
    </select>

    <label>🎙️ 토론 제어</label>
    <div class="btn-group">
        <button id="startBtn">🔴 토론 시작 (음성인식 ON)</button>
        <button id="stopBtn" disabled>⏹️ 토론 종료 (음성인식 OFF)</button>
    </div>

    <label>💬 AI가 받아 적은 토론 내용 (수정 불가)</label>
    <textarea id="debateText" readonly placeholder="[토론 시작] 버튼을 누르고 마이크에 말씀하시면 여기에 실시간으로 기록됩니다."></textarea>
    
    <button id="submitBtn" disabled>🚀 최종 토론 내용 제출하기</button>
    
    <p id="status">상태: 대기 중...</p>
</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // 🔴 중요: firestore가 아니라 database를 불러옵니다!
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 🔴 의리T의 Firebase 설정값을 여기에 정확히 넣어주세요!
        // (databaseURL 이라는 주소가 새로 포함되어 있을 수 있으니 프로젝트 설정에서 다시 확인 후 넣으면 좋습니다!)
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            apiKey: "AIzaSyA-y4_CgIabLBYLNOMQCyQguXFTWNczQKo",
            authDomain: "ethics1class-2026-8e2d7.firebaseapp.com",
            databaseURL: "https://ethics1class-2026-8e2d7-default-rtdb.firebaseio.com",
            projectId: "ethics1class-2026-8e2d7",
            storageBucket: "ethics1class-2026-8e2d7.firebasestorage.app",
            messagingSenderId: "916404306806",
            appId: "1:916404306806:web:f5a214b6881f5c4189b057"
        };

        // Firebase 및 Realtime DB 초기화
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const submitBtn = document.getElementById('submitBtn');
        const debateText = document.getElementById('debateText');
        const statusText = document.getElementById('status');

        // 크롬 브라우저 AI 음성인식 엔진 설정
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (!SpeechRecognition) {
            alert("크롬(Chrome) 브라우저를 사용해 주세요!");
        } else {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ko-KR';

            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    }
                }
                if(finalTranscript) {
                    debateText.value += finalTranscript;
                }
            };

            recognition.onend = () => {
                if (startBtn.disabled && !stopBtn.disabled) {
                    recognition.start();
                }
            };
        }

        // [🔴 토론 시작] 버튼
        startBtn.onclick = () => {
            const names = document.getElementById('studentNames').value.trim();
            if (!names) {
                alert("참여 학생 이름을 먼저 입력해 주세요!");
                return;
            }
            debateText.value = ""; 
            recognition.start();
            
            startBtn.disabled = true;
            stopBtn.disabled = false;
            submitBtn.disabled = true;
            statusText.innerText = "🎙️ AI가 토론을 실시간으로 기록 중입니다...";
            statusText.style.color = "red";
        };

        // [⏹️ 토론 종료] 버튼
        stopBtn.onclick = () => {
            recognition.stop();
            startBtn.disabled = false;
            stopBtn.disabled = true;
            submitBtn.disabled = false;
            statusText.innerText = "⏹️ 기록 정지. [최종 제출하기] 버튼을 누르세요.";
            statusText.style.color = "blue";
        };

        // [🚀 최종 제출하기] 버튼 (Realtime Database로 전송)
        submitBtn.onclick = async () => {
            const names = document.getElementById('studentNames').value.trim();
            const team = document.getElementById('teamSelect').value;
            const content = debateText.value.trim();

            statusText.innerText = "⏳ 실시간 장부에 기록 중...";
            submitBtn.disabled = true;

            try {
                // Realtime DB의 'debates' 노드에 데이터 추가
                const dbRef = ref(db, 'debates');
                await push(dbRef, {
                    studentNames: names,
                    teamName: team,
                    debateContent: content,
                    timestamp: Date.now(), // 실시간 디비는 타임스탬프를 숫자로 저장하는 게 편리합니다.
                });

                statusText.innerText = `✅ 제출 성공! Realtime 장부에 안전하게 저장되었습니다.`;
                statusText.style.color = "green";
                debateText.value = "";

            } catch (error) {
                console.error(error);
                statusText.innerText = "❌ 저장 실패! RTDB 규칙 설정을 확인해 주세요.";
                statusText.style.color = "red";
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
