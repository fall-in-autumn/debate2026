<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>의리T의 100% 무료 도덕 토론방 (텍스트 버전)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 25px; line-height: 1.6; background-color: #f9f9f9; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; font-size: 15px; }
        textarea { height: 150px; resize: none; }
        button { width: 100%; padding: 12px; background-color: #4A90E2; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #357ABD; }
        #status { font-weight: bold; text-align: center; margin-top: 20px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 도덕 수업 모둠 토론방</h1>
    <p style="text-align: center; color: #666;">모둠원들과 함께 토론한 내용을 정리해서 제출해 주세요.</p>
    <hr>
    
    <!-- 1. 학생 정보 입력창 -->
    <label>👥 참여 학생 이름</label>
    <input type="text" id="studentNames" placeholder="예: 김철수, 이영희, 박민수">
    
    <label>🏫 모둠 선택</label>
    <select id="teamSelect">
        <option value="1모둠">1모둠</option>
        <option value="2모둠">2모둠</option>
        <option value="3모둠">3모둠</option>
        <option value="4모둠">4모둠</option>
    </select>

    <!-- 2. 토론 내용 입력창 -->
    <label>💬 우리 모둠의 토론 기록 및 최종 의견</label>
    <textarea id="debateText" placeholder="여기에 도덕적 딜레마에 대한 모둠원들의 의견을 요약하여 작성하세요."></textarea>
    
    <!-- 3. 제출 버튼 -->
    <button id="submitBtn">🚀 토론 내용 제출하기</button>
    
    <!-- 4. 상태 안내 문구 -->
    <p id="status">상태: 대기 중...</p>
</div>

    <!-- Firebase 연결용 스크립트 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-y4_CgIabLBYLNOMQCyQguXFTWNczQKo",
            authDomain: "ethics1class-2026-8e2d7.firebaseapp.com",
            projectId: "ethics1class-2026-8e2d7",
            storageBucket: "ethics1class-2026-8e2d7.firebasestorage.app",
            messagingSenderId: "916404306806",
            appId: "1:916404306806:web:f5a214b6881f5c4189b057"
        };

        // Firebase 및 Firestore 시작
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const submitBtn = document.getElementById('submitBtn');
        const statusText = document.getElementById('status');

        // 버튼 클릭 이벤트
        submitBtn.onclick = async () => {
            const names = document.getElementById('studentNames').value.trim();
            const team = document.getElementById('teamSelect').value;
            const content = document.getElementById('debateText').value.trim();

            // 빈칸 검사
            if (!names || !content) {
                alert("이름과 토론 내용을 모두 입력해 주세요!");
                return;
            }

            statusText.innerText = "⏳ 장부에 토론 기록을 적는 중...";
            statusText.style.color = "#666";
            submitBtn.disabled = true;

            try {
                // 의리T가 만든 'debates' 컬렉션 장부에 데이터 집어넣기
                await addDoc(collection(db, "debates"), {
                    studentNames: names,
                    teamName: team,
                    debateContent: content,
                    timestamp: new Date(),
                    score: "",     // 선생님 점수 칸 (초기값 빈칸)
                    feedback: ""   // 선생님 피드백 칸 (초기값 빈칸)
                });

                statusText.innerText = `✅ 제출 완료! [${team}]의 기록이 성공적으로 저장되었습니다.`;
                statusText.style.color = "green";
                
                // 전송 성공 후 입력창 청소
                document.getElementById('debateText').value = "";
                submitBtn.disabled = false;

            } catch (error) {
                console.error("에러 상세 정보:", error);
                statusText.innerText = "❌ 저장 실패! [F12] 키를 눌러 콘솔 창의 빨간 에러 메시지를 확인해 주세요.";
                statusText.style.color = "red";
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
